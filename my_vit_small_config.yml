train:
  dataset_path: ImageFolder:../dinov2_dataset/train
  output_dir: ../checkpoints_ssl
  saveckp_freq: 20
  seed: 42
  batch_size_per_gpu: 32
  epochs: 100

student:
  arch: vit_small
  patch_size: 14
  drop_path_rate: 0.1
  pretrained_weights: https://dl.fbaipublicfiles.com/dinov2/dinov2_vits14/dinov2_vits14_pretrain.pth

teacher:
  momentum_teacher: 0.994

optim:
  epochs: 100
  weight_decay: 0.04
  weight_decay_end: 0.4
  base_lr: 0.0002
  warmup_epochs: 10
  freeze_last_layer_epochs: 1

crops:
  global_crops_scale: [0.5, 1.0]
  local_crops_number: 6
  local_crops_scale: [0.15, 0.5]
  global_crops_size: 224
  local_crops_size: 96

dino:
  loss_weight: 1.0
  head_n_prototypes: 65536
  koleo_loss_weight: 0.1

ibot:
  loss_weight: 1.0
  separate_head: true
  head_n_prototypes: 65536
  mask_sample_probability: 0.5
  mask_ratio_min_max: [ 0.1, 0.5 ]

evaluation:
  eval_period_iterations: 1000

wandb:
  entity: "ungureanu-li-daria"
  project: "Licenta-DINOv2-Repo"
  name: "vit_small_run1"